# Orbit frame showcase.
#
# Design intent:
# - circular OSD frame instead of a long strip
# - ring is the main object, not a small decoration
# - quiet-state breathing with stronger response during speech
# - graded response: gains are tuned so normal speech sweeps the rings
#   through their range instead of pinning them at max_scale
# - stable hierarchy: the accent hero ring always encloses the thinner
#   foreground tracker, so they never collide at loud moments

[osd]
frontend = "quickshell"
style = "default"
palette = "omarchy"
layout = "orb"
position = "bottom-center"
top_margin = 0.74

[osd.frame]
background = "none"
border = "none"
glow = true
halo = true

[[osd.visual.layers]]
type = "shadow"
source = "peak"
color = "background"
order = -20
x = 0.0
y = 0.0
width = 1.0
height = 1.0
gain = 1.55
opacity = 0.92
radius = 0.70

[[osd.visual.layers]]
type = "background"
source = "vad"
color = "accent"
order = 0
x = 0.0
y = 0.0
width = 1.0
height = 1.0
gain = 1.0
opacity = 0.18
radius = 84

# Kept soft so loud moments tint the disc without filling it solid,
# which would hide the ring separation.
[[osd.visual.layers]]
type = "pulse"
source = "rms"
color = "accent"
order = 10
x = 0.0
y = 0.0
width = 1.0
height = 1.0
gain = 2.0
opacity = 0.22
radius = 84
speed = 0.8

# Hero ring: thick accent stroke, breathes at rest, expands with peaks.
[[osd.visual.layers]]
type = "ring"
source = "peak"
color = "accent"
order = 20
x = 0.0
y = 0.0
width = 1.0
height = 1.0
gain = 2.6
opacity = 1.0
radius = 6
base_scale = 0.25
response_scale = 0.13
response_curve = 0.55
breath_scale = 0.02
max_scale = 0.40
speed = 1.0

# Inner tracker: thin, more reactive relative to its size, and breathing
# at a different speed so the two rings drift out of phase at rest.
[[osd.visual.layers]]
type = "ring"
source = "peak"
color = "foreground"
order = 30
x = 0.0
y = 0.0
width = 1.0
height = 1.0
gain = 1.8
opacity = 0.58
radius = 2
base_scale = 0.17
response_scale = 0.15
response_curve = 0.6
breath_scale = 0.015
max_scale = 0.35
speed = 1.45
