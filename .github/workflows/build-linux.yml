name: Build Linux

# `contents: write` is required by softprops/action-gh-release@v1 to create
# the GH release and upload assets on tag push. Without it, the release job
# fails with HTTP 403 even though the matrix builds succeed.
permissions:
  contents: write

# Builds the full 8-binary x86_64 release matrix using Docker for every variant.
# Each Dockerfile pins a glibc cap via its base image; the matrix mirrors that
# with a matching ubuntu host runner as belt-and-suspenders. See CLAUDE.md
# "Building Release Binaries" for the policy this enforces.
#
# The release job signs the GitHub auto-archive source tarball (issue #415)
# using the GPG_PRIVATE_KEY secret. Once that secret is configured, the same
# import can be extended to detach-sign each voxtype-* binary artifact and
# SHA256SUMS.txt; the .asc files would be uploaded alongside the binaries.

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-rc*'
    branches:
      - 'rc/*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without v prefix). Leave blank to read from Cargo.toml.'
        required: false
        default: ''

jobs:
  build:
    name: build-${{ matrix.variant }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: avx2
            arch: x86_64
            dockerfile: Dockerfile.build
            runner: ubuntu-22.04
            glibc_cap: '2.35'
            check_no_avx512: true
            companion_libs: ''
            timeout_minutes: 60
          - variant: vulkan
            arch: x86_64
            dockerfile: Dockerfile.vulkan
            runner: ubuntu-24.04
            glibc_cap: '2.39'
            check_no_avx512: true
            companion_libs: ''
            timeout_minutes: 60
          - variant: avx512
            arch: x86_64
            dockerfile: Dockerfile.avx512
            runner: ubuntu-22.04
            glibc_cap: '2.35'
            check_no_avx512: false
            companion_libs: ''
            timeout_minutes: 60
          - variant: onnx-avx2
            arch: x86_64
            dockerfile: Dockerfile.onnx
            runner: ubuntu-24.04
            glibc_cap: '2.39'
            check_no_avx512: false
            companion_libs: ''
            timeout_minutes: 90
          - variant: onnx-avx512
            arch: x86_64
            dockerfile: Dockerfile.onnx-avx512
            runner: ubuntu-24.04
            glibc_cap: '2.39'
            check_no_avx512: false
            companion_libs: ''
            timeout_minutes: 90
          - variant: onnx-cuda-12
            arch: x86_64
            dockerfile: Dockerfile.onnx-cuda-12
            runner: ubuntu-24.04
            glibc_cap: '2.39'
            check_no_avx512: false
            companion_libs: 'libonnxruntime_providers_cuda.so libonnxruntime_providers_shared.so'
            timeout_minutes: 120
          - variant: onnx-cuda-13
            arch: x86_64
            dockerfile: Dockerfile.onnx-cuda-13
            runner: ubuntu-24.04
            glibc_cap: '2.39'
            check_no_avx512: false
            # cuda-13 dlopens ORT via ort/load-dynamic so the runtime ships
            # alongside the binary (Microsoft's prebuilt is the only 1.24.4
            # build with sm_120 Blackwell coverage, and it's distributed as
            # .so only — see Dockerfile.onnx-cuda-13 header).
            companion_libs: 'libonnxruntime.so.1.24.4 libonnxruntime_providers_cuda.so libonnxruntime_providers_shared.so'
            timeout_minutes: 120
          - variant: onnx-migraphx
            arch: x86_64
            dockerfile: Dockerfile.onnx-migraphx
            runner: ubuntu-24.04
            glibc_cap: '2.39'
            check_no_avx512: false
            companion_libs: 'libonnxruntime_providers_migraphx.so libonnxruntime_providers_shared.so'
            timeout_minutes: 180
          # Experimental aarch64 variants. CPU-only — no GPU EPs on arm64
          # (Jetson CUDA toolchain is awkward, no mainstream consumer arm64
          # Vulkan hardware yet). Marked experimental in release notes until
          # external users validate on Pi/Ampere/Graviton/Snapdragon X.
          - variant: cpu
            arch: aarch64
            dockerfile: Dockerfile.aarch64-cpu
            runner: ubuntu-22.04-arm
            glibc_cap: '2.35'
            check_no_avx512: false
            companion_libs: ''
            timeout_minutes: 60
          - variant: onnx
            arch: aarch64
            dockerfile: Dockerfile.aarch64-onnx
            runner: ubuntu-24.04-arm
            glibc_cap: '2.39'
            check_no_avx512: false
            companion_libs: ''
            timeout_minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          set -euo pipefail
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT_VERSION="${{ github.event.inputs.version }}"
            if [[ -n "${INPUT_VERSION}" ]]; then
              VERSION="${INPUT_VERSION}"
            else
              VERSION="${CARGO_VERSION}"
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            # On tag pushes, fail fast if Cargo.toml's version doesn't match
            # the tag. `voxtype --version` reads CARGO_PKG_VERSION at compile
            # time, and the AUR `voxtype` source PKGBUILD's `cargo fetch
            # --locked` requires Cargo.lock to list the same version. A tag
            # cut without a matching bump produces binaries that report the
            # previous version and a source package that won't build (the
            # v0.4.6 incident). Strip an optional `-rc.*` / `-rc*` suffix on
            # both sides so a v0.7.3-rc1 tag matches Cargo.toml's 0.7.3.
            tag_base="${VERSION%%-rc*}"
            cargo_base="${CARGO_VERSION%%-rc*}"
            if [[ "${tag_base}" != "${cargo_base}" ]]; then
              echo "::error::Cargo.toml version (${CARGO_VERSION}) does not match tag (${VERSION})."
              echo "::error::Bump Cargo.toml + Cargo.lock to ${tag_base} before tagging."
              exit 1
            fi
          else
            # Branch push (e.g. rc/*) — read from Cargo.toml so artifacts get a sensible name.
            VERSION="${CARGO_VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved VERSION=${VERSION} (Cargo.toml: ${CARGO_VERSION})"

      - name: Build ${{ matrix.variant }} binary in Docker
        run: |
          set -euo pipefail
          VERSION='${{ steps.version.outputs.version }}'
          docker build \
            -f '${{ matrix.dockerfile }}' \
            -t 'voxtype-${{ matrix.variant }}' \
            --build-arg "VERSION=${VERSION}" \
            .
          mkdir -p "releases/${VERSION}"
          docker run --rm \
            -e "VERSION=${VERSION}" \
            -v "${PWD}/releases/${VERSION}:/output" \
            'voxtype-${{ matrix.variant }}'

      - name: Take ownership of Docker outputs
        run: |
          set -euo pipefail
          VERSION='${{ steps.version.outputs.version }}'
          # Docker writes /output as root via the volume mount. Chown to the
          # runner user so subsequent workflow steps can read/move files.
          sudo chown -R "$(id -u):$(id -g)" "releases/${VERSION}"

      - name: Verify binary version
        run: |
          set -euo pipefail
          VERSION='${{ steps.version.outputs.version }}'
          BIN="releases/${VERSION}/voxtype-${VERSION}-linux-${{ matrix.arch }}-${{ matrix.variant }}"
          test -f "${BIN}" || { echo "Missing binary: ${BIN}"; ls -la "releases/${VERSION}/"; exit 1; }
          # The Dockerfile already sets the binary to 755; no chmod needed.
          # GPU variants may not have CUDA/ROCm on the host runner; --version should
          # still resolve without loading providers.
          # AVX-512 variants are cross-compiled with target-cpu=x86-64-v4. Skip
          # the runtime --version check on those because the GitHub-hosted
          # runner CPU usually lacks AVX-512 and would SIGILL. The Dockerfile's
          # in-build AVX-512 presence check already proves the binary is valid.
          if [[ "${{ matrix.variant }}" == *avx512* ]]; then
            echo "Skipping --version check on cross-compiled AVX-512 binary (runner CPU lacks AVX-512)."
            file "${BIN}"
          else
            "${BIN}" --version
          fi

      - name: Verify glibc cap (max <= ${{ matrix.glibc_cap }})
        run: |
          set -euo pipefail
          VERSION='${{ steps.version.outputs.version }}'
          BIN="releases/${VERSION}/voxtype-${VERSION}-linux-${{ matrix.arch }}-${{ matrix.variant }}"
          CAP='${{ matrix.glibc_cap }}'
          MAX=$(objdump -T "${BIN}" 2>/dev/null \
            | grep -oP 'GLIBC_\d+\.\d+' \
            | sed 's/GLIBC_//' \
            | sort -t. -k1,1n -k2,2n -u \
            | tail -1)
          echo "Max glibc requirement: GLIBC_${MAX} (cap GLIBC_${CAP})"
          if [[ -z "${MAX}" ]]; then
            echo "Could not determine max glibc version"; exit 1
          fi
          # Compare as version: fail if MAX > CAP.
          higher=$(printf '%s\n%s\n' "${CAP}" "${MAX}" | sort -t. -k1,1n -k2,2n | tail -1)
          if [[ "${higher}" != "${CAP}" ]]; then
            echo "FAIL: binary requires GLIBC_${MAX} which exceeds cap GLIBC_${CAP}"
            echo "This binary was likely linked against a newer host glibc than the Docker base image."
            exit 1
          fi

      - name: Verify ISA floor (Haswell / x86_64-v3) on AVX2 and Vulkan variants
        if: matrix.check_no_avx512
        run: |
          set -euo pipefail
          VERSION='${{ steps.version.outputs.version }}'
          BIN="releases/${VERSION}/voxtype-${VERSION}-linux-${{ matrix.arch }}-${{ matrix.variant }}"
          # The "no AVX-512" variants must run on every x86_64-v3 CPU: Haswell,
          # Kaby Lake, Zen 2, Zen 3, etc. That floor excludes AVX-512, GFNI,
          # AVX-VNNI, and SSE4a (AMD-only). The previous gate only checked zmm
          # registers — Zen 3 lacks AVX-512 but still has SSE4a's `insertq`,
          # which is what crashed Kaby Lake daemons in issue #393. NOTE:
          # SHA-NI, VAES (ymm), and VPCLMULQDQ (ymm) are NOT checked because
          # the sha2/aes crates emit them behind cpufeatures-dispatched
          # runtime CPUID guards; they show up in every working binary.
          DUMP=$(objdump -d "${BIN}")
          ZMM=$(echo "$DUMP" | grep -c zmm || true)
          EVEX=$(echo "$DUMP" | grep -cE 'vpternlog|vpermt2|vpermi2|vpblendm|valign[dq]|vpcompress|vpexpand' || true)
          BCAST=$(echo "$DUMP" | grep -c '{1to' || true)
          GFNI=$(echo "$DUMP" | grep -cE '\b(vgf2p8|gf2p8)' || true)
          SSE4A=$(echo "$DUMP" | grep -cE '\b(insertq|extrq)\b' || true)
          AVXVNNI=$(echo "$DUMP" | grep -cE '\bvpdpbus(d|ds)|vpdpwss(d|ds)' || true)
          printf '  zmm registers:     %s\n' "$ZMM"
          printf '  AVX-512 EVEX:      %s\n' "$EVEX"
          printf '  AVX-512 broadcast: %s\n' "$BCAST"
          printf '  GFNI:              %s\n' "$GFNI"
          printf '  SSE4a (AMD-only):  %s\n' "$SSE4A"
          printf '  AVX-VNNI:          %s\n' "$AVXVNNI"
          fail=0
          for n in "$ZMM" "$EVEX" "$BCAST" "$GFNI" "$SSE4A" "$AVXVNNI"; do
            [[ "${n:-0}" -gt 0 ]] && fail=1
          done
          if [[ "$fail" -ne 0 ]]; then
            echo "FAIL: ${{ matrix.variant }} binary contains out-of-floor instructions."
            echo "It will SIGILL on x86_64-v3 CPUs (Kaby Lake, Zen 2/3, Haswell, etc.)."
            echo "Most likely cause: RUSTFLAGS uses target-cpu=native or GGML_NATIVE=ON"
            echo "on a build host whose CPU has features the floor doesn't allow."
            exit 1
          fi

      - name: Stage companion libraries
        if: matrix.companion_libs != ''
        run: |
          set -euo pipefail
          VERSION='${{ steps.version.outputs.version }}'
          PREFIX="releases/${VERSION}/voxtype-${VERSION}-linux-${{ matrix.arch }}-${{ matrix.variant }}"
          missing=0
          for lib in ${{ matrix.companion_libs }}; do
            f="${PREFIX}.${lib}"
            if [[ -f "${f}" ]]; then
              echo "Found ${f}"
            else
              echo "MISSING ${f}"
              missing=1
            fi
          done
          if [[ "${missing}" -ne 0 ]]; then
            echo "One or more companion libraries are missing from the Docker output."
            ls -la "releases/${VERSION}/"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voxtype-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}-${{ matrix.variant }}
          path: releases/${{ steps.version.outputs.version }}/voxtype-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}-${{ matrix.variant }}*
          if-no-files-found: error
          retention-days: 14

      # The OSD launcher and GTK4 frontend are engine-agnostic and built once
      # by Dockerfile.onnx alongside the onnx-avx2 binary (same `cargo build
      # --bin voxtype-osd --bin voxtype-osd-gtk4` invocation). The onnx-avx2
      # job is the only place those binaries end up in /output, so upload them
      # as their own artifacts here. Other matrix variants skip this step.
      - name: Upload OSD binaries (onnx-avx2 only)
        if: matrix.variant == 'onnx-avx2'
        uses: actions/upload-artifact@v4
        with:
          name: voxtype-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}-osd
          path: releases/${{ steps.version.outputs.version }}/voxtype-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}-osd*
          if-no-files-found: error
          retention-days: 14

  release:
    name: collect-and-release
    needs: build
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT_VERSION="${{ github.event.inputs.version }}"
            if [[ -n "${INPUT_VERSION}" ]]; then
              VERSION="${INPUT_VERSION}"
            else
              VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved VERSION=${VERSION}"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          # Pull each matrix-job artifact (named voxtype-${VERSION}-linux-${arch}-${variant})
          # but skip the combined linux-all artifact this same job will write.
          pattern: voxtype-*-linux-*-*

      - name: Collect binaries
        run: |
          set -euo pipefail
          VERSION='${{ steps.version.outputs.version }}'
          mkdir -p "releases/${VERSION}"
          # Flatten artifact subdirs into releases/${VERSION}/.
          find artifacts -type f -name 'voxtype-*' -exec mv -n {} "releases/${VERSION}/" \;
          echo "Collected files:"
          ls -la "releases/${VERSION}/"

      - name: Generate SHA256SUMS.txt
        run: |
          set -euo pipefail
          VERSION='${{ steps.version.outputs.version }}'
          cd "releases/${VERSION}"
          # Sums cover every voxtype-* binary and any companion .so files.
          shopt -s nullglob
          files=( voxtype-* )
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No voxtype-* files to checksum; failing."
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS.txt
          echo "SHA256SUMS.txt:"
          cat SHA256SUMS.txt

      # NOTE: binary signing (detach-sign each voxtype-* artifact + SHA256SUMS.txt)
      # is a separate follow-up. The auto-archive signing step below (issue #415)
      # already imports GPG_PRIVATE_KEY; binary signing can reuse that same setup
      # once we decide whether to ship per-binary .asc files.

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: voxtype-${{ steps.version.outputs.version }}-linux-all
          path: |
            releases/${{ steps.version.outputs.version }}/voxtype-*
            releases/${{ steps.version.outputs.version }}/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          fail_on_unmatched_files: true
          files: |
            releases/${{ steps.version.outputs.version }}/voxtype-*
            releases/${{ steps.version.outputs.version }}/SHA256SUMS.txt

      # Sign the GitHub-generated source archive (what `makepkg` for the AUR
      # `voxtype` source PKGBUILD downloads) and upload the detached signature
      # as a release asset. See issue #415 for the post-mortem: a previous
      # release shipped a `.asc` signed against a locally-built tarball with
      # different gzip metadata, so `gpg --verify` failed on the auto-archive
      # the PKGBUILD actually pulls. Signing the auto-archive byte-for-byte
      # closes that gap.
      #
      # Signing is done with a dedicated 1-year signing SUBKEY of the
      # maintainer's primary key (E79F5BAF8CD51A806AA27DBB7DA2709247D75BC6).
      # Subkey: 390AA166FE02D00BCF37150FC6277FA9D80B9EC8 (short id
      # C6277FA9D80B9EC8). A subkey scopes blast radius if the CI secret is
      # ever exfiltrated: the primary stays offline and can revoke the
      # subkey, downstream verifiers still trust signatures via the primary
      # binding (RFC 4880 §5.2.1 back-sig).
      #
      # Two repo secrets are required:
      #   GPG_PRIVATE_KEY  — ASCII-armored export of the SIGNING SUBKEY's
      #                      secret material (NOT the primary):
      #                        gpg --export-secret-subkeys --armor \
      #                          C6277FA9D80B9EC8! \
      #                          | gh secret set GPG_PRIVATE_KEY \
      #                            -R peteonrails/voxtype
      #                      The trailing `!` on the key ID is critical:
      #                      it tells gpg to export only that subkey.
      #   GPG_PASSPHRASE   — the random passphrase guarding the subkey on
      #                      disk; piped to gpg over stdin with
      #                      `--passphrase-fd 0 --pinentry-mode loopback`.
      #
      # If either secret is missing, the step fails with an actionable error
      # so the first release attempt loudly surfaces the gap.
      - name: Sign GitHub auto-archive (closes #415)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION='${{ steps.version.outputs.version }}'
          TAG="v${VERSION}"
          AUTO_TARBALL_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          SIGNING_SUBKEY="C6277FA9D80B9EC8"

          if [[ -z "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "::error::GPG_PRIVATE_KEY secret is not set."
            echo "::error::The AUR 'voxtype' source PKGBUILD requires a signed auto-archive."
            echo "::error::Export and upload the signing subkey (NOT the primary key):"
            echo "::error::  gpg --export-secret-subkeys --armor ${SIGNING_SUBKEY}! \\"
            echo "::error::    | gh secret set GPG_PRIVATE_KEY -R peteonrails/voxtype"
            exit 1
          fi
          if [[ -z "${GPG_PASSPHRASE:-}" ]]; then
            echo "::error::GPG_PASSPHRASE secret is not set."
            echo "::error::The signing subkey is passphrase-protected; CI needs the passphrase."
            echo "::error::Set it via:  gh secret set GPG_PASSPHRASE -R peteonrails/voxtype"
            exit 1
          fi

          WORK=$(mktemp -d)
          trap 'rm -rf "${WORK}"' EXIT

          # Import the maintainer subkey into a throwaway GPG home so we don't
          # pollute the runner's default keyring across steps. allow-loopback-
          # pinentry lets us pass the passphrase over stdin (--passphrase-fd 0)
          # without an interactive prompt, which doesn't exist in CI.
          export GNUPGHOME="${WORK}/gpg"
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"
          printf 'allow-loopback-pinentry\n' > "${GNUPGHOME}/gpg-agent.conf"
          printf 'pinentry-mode loopback\n' > "${GNUPGHOME}/gpg.conf"
          gpgconf --kill gpg-agent || true
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import

          # Wait briefly for GitHub to materialize the auto-archive. The
          # archive is generated on first request, but a release uploaded
          # seconds earlier may race with the tarball endpoint. Retry with
          # backoff to keep the workflow robust.
          TARBALL="${WORK}/voxtype-${VERSION}.tar.gz"
          for attempt in 1 2 3 4 5; do
            if curl -fsSL "${AUTO_TARBALL_URL}" -o "${TARBALL}"; then
              break
            fi
            echo "Auto-archive not ready yet (attempt ${attempt}/5); sleeping..."
            sleep $((attempt * 5))
          done
          test -s "${TARBALL}" || { echo "::error::Failed to download ${AUTO_TARBALL_URL}"; exit 1; }

          # Detach-sign in ASCII-armored form. Lock signing to the subkey
          # explicitly with the `!` suffix on --local-user so gpg can't fall
          # back to any other signing-capable key that might be present.
          # Passphrase comes in over stdin via --passphrase-fd 0 with
          # --pinentry-mode loopback, matching the gpg.conf above.
          # Output filename matches the AUR PKGBUILD's expected asset name
          # (voxtype-$pkgver.tar.gz.asc).
          ASC="${WORK}/voxtype-${VERSION}.tar.gz.asc"
          printf '%s' "${GPG_PASSPHRASE}" | gpg --batch --yes \
              --pinentry-mode loopback \
              --passphrase-fd 0 \
              --local-user "${SIGNING_SUBKEY}!" \
              --detach-sign --armor \
              --output "${ASC}" \
              "${TARBALL}"

          # Upload (--clobber to overwrite any stale asset from a prior
          # workflow re-run on the same tag).
          gh release upload "${TAG}" "${ASC}" --clobber --repo "${GITHUB_REPOSITORY}"

          echo "Uploaded signature for auto-archive: voxtype-${VERSION}.tar.gz.asc"

      # Self-check: re-download both the auto-archive and the just-uploaded
      # .asc, then verify. This guards against future regressions of the
      # same class as #415 (signing the wrong bytes) and against accidental
      # asset overwrites that break the signature link.
      - name: Verify auto-archive signature
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION='${{ steps.version.outputs.version }}'
          TAG="v${VERSION}"
          WORK=$(mktemp -d)
          trap 'rm -rf "${WORK}"' EXIT

          # Pull the same auto-archive URL the AUR PKGBUILD uses.
          curl -fsSL \
            "https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz" \
            -o "${WORK}/voxtype-${VERSION}.tar.gz"

          # Pull the signature asset we just uploaded.
          gh release download "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "voxtype-${VERSION}.tar.gz.asc" \
            --dir "${WORK}"

          # Import the maintainer public key from the keyserver to verify
          # without trusting the .asc's own claims. Falls back to whatever
          # signed it if keyserver lookup fails (still proves the sig matches
          # the bytes).
          export GNUPGHOME="${WORK}/gpg"
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"
          gpg --batch --keyserver hkps://keys.openpgp.org \
              --recv-keys E79F5BAF8CD51A806AA27DBB7DA2709247D75BC6 \
              || echo "Keyserver lookup failed; verification will rely on the .asc's own key id"

          gpg --batch --verify \
            "${WORK}/voxtype-${VERSION}.tar.gz.asc" \
            "${WORK}/voxtype-${VERSION}.tar.gz"

          echo "Auto-archive signature verifies cleanly against the GitHub-generated tarball."
